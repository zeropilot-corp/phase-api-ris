name: Validate ERDs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate example ERDs against schema (JSON Schema draft-07)
        run: |
          python validation/validate_erd.py \
            schema/erd_pin_28ghz.json \
            schema/erd_varactor_28ghz.json
